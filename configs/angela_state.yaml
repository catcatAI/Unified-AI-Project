# Angela State Matrix Configuration
# ==================================
# Phase 4: Configuration Externalization
# Replaces all hardcoded values in state_matrix.py

state_matrix:
  max_history: 500
  max_misallocation_log: 100
  max_audit_trail: 50

  # Default precision
  default_precision: 1.0

  # History recording interval (seconds)
  history_interval: 1.0

