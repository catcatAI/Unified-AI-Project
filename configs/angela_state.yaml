# =============================================
# ALLOCATION POLICY
# =============================================
allocation:
  assign_threshold: 0.7
  composite_threshold: 0.3
  composite_min_axes: 2
  create_novelty_threshold: 0.6
  create_complexity_min: 2
  create_confidence: 0.5
  defer_confidence: 0.3
  high_similarity_threshold: 0.5

  # Buffer settings
  buffer:
    max_size: 50
    track_threshold: 5
    creation_urge_boost: 0.05

# =============================================
# NEGATIVITY DETECTOR (θ)
# =============================================
negativity:
  trigger_threshold: 0.5
  correction_urge_threshold: 0.6
  audit_intensity_base: 0.5
  max_misallocation_log: 100
  max_audit_trail: 50

  # Detection parameters
  detection:
    drift_threshold_base: 0.3
    drift_threshold_min: 0.15
    drift_threshold_max: 0.4
    min_window: 3
    max_window: 50

  # Correction parameters
  correction:
    delta_amount: 0.1
    negativity_reduction: 0.05
    correction_urge_reduction: 0.10

# =============================================
# INFLUENCE MATRIX
# =============================================
influence:
  softening: 10.0
  influence_factor_min: 0.5
  influence_factor_max: 2.0

  # Base influence matrix [source][target] = base_strength
  # Computed as: base * source_avg * source_weight * target_weight * spatial_factor
  matrix:
    alpha:
      beta: 0.4
      gamma: 0.2
      delta: 0.1
      epsilon: 0.3
      theta: 0.2
    beta:
      alpha: 0.3
      gamma: 0.5
      delta: 0.2
      epsilon: 0.4
      theta: 0.3
    gamma:
      alpha: 0.2
      beta: 0.3
      delta: 0.4
      epsilon: 0.2
      theta: 0.2
    delta:
      alpha: 0.1
      beta: 0.2
      gamma: 0.3
      epsilon: 0.1
      theta: 0.2
    epsilon:
      alpha: 0.2
      beta: 0.5
      gamma: 0.3
      delta: 0.1
      theta: 0.2
    theta:
      alpha: 0.2
      beta: 0.3
      gamma: 0.2
      delta: 0.2
      epsilon: 0.3

# =============================================
# INTENT GRAVITY (N.21.3)
# =============================================
intent_gravity:
  base_strength: 0.05
  max_shift_per_update: 0.1
  decay_rate: 0.95
  stability_threshold: 0.01

# =============================================
# INTER-DIMENSIONAL DRAG (N.21.7)
# =============================================
inter_dimensional_drag:
  drag_coefficient: 0.02
  min_weight: 0.001
  max_cascade_depth: 3

# =============================================
# EPSILON → GAMMA RIPPLE (N.22-EPSILON-RIPPLE)
# =============================================
epsilon_ripple:
  surprise_weight: 0.2
  happiness_weight: 0.15
  fatigue_threshold: 0.7
  focus_drain_per_fatigue: 0.1
  calm_drain_per_fatigue: 0.05

# =============================================
# SPATIAL INFLUENCE (N.20.1)
# =============================================
spatial:
  gravity_constant: 25.0
  softening_parameter: 10.0
  influence_min: 0.5
  influence_max: 2.0