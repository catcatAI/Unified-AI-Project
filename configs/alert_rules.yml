# =============================================================================
# Angela AI - Prometheus Alert Rules
# =============================================================================

groups:
  - name: angela_alerts
    rules:
      # Backend Down
      - alert: AngelaBackendDown
        expr: up{job="angela-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Angela Backend is down"
          description: "Angela Backend has been down for more than 1 minute."

      # High Response Time
      - alert: HighResponseTime
        expr: http_request_duration_seconds{job="angela-backend"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "Average response time is {{ $value }}s."

      # High Error Rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} requests/sec."

      # Redis Down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute."

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="angela-backend"} / 1024 / 1024 > 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB."

      # High CPU Usage
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="angela-backend"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}."
