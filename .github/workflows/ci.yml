name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install JS workspaces
        run: pnpm install --frozen-lockfile=false
      - name: Lint (JS)
        run: pnpm lint:js
      - name: Prettier check (JS/TS)
        run: pnpm exec prettier --check "**/*.{js,jsx,ts,tsx,json,md}"
      - name: Test (JS placeholder)
        run: echo "No JS unit tests configured yet"

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.9', '3.11' ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install backend (editable with extras)
        run: pip install -e ./apps/backend[standard,testing]
      - name: Lint/Type (Python)
        run: |
          black --check apps/backend/src tests/
          isort --check-only apps/backend/src tests/
          flake8 apps/backend/src tests/
          mypy apps/backend/src
      - name: Tests (Python)
        run: pytest --cov=apps/backend/src --cov-report=term-missing

  secrets_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks
        uses: zricethezav/gitleaks-action@v2.3.2
        with:
          args: --no-git
