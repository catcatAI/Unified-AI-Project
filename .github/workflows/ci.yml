name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install JS workspaces
        run: pnpm install --frozen-lockfile=false
      - name: Lint (JS)
        run: pnpm lint:js
      - name: Prettier check (JS/TS)
        run: pnpm exec prettier --check "**/*.{js,jsx,ts,tsx,json,md}"
      - name: Test (JS placeholder)
        run: echo "No JS unit tests configured yet"

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.14' ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Version consistency check
        run: |
          EXPECTED="7.5.0-dev"
          ERR=0
          check() { local file=$1 expected=$2 actual=$(cat "$file" 2>/dev/null | grep -oP '"version":\s*"\K[^"]+' || true); if [ "$actual" != "$expected" ]; then echo "❌ $file: expected $expected, got $actual"; ERR=1; fi; }
          echo "Verifying all version locations match $EXPECTED..."
          grep -q "$EXPECTED" VERSION || { echo "❌ VERSION: expected $EXPECTED"; ERR=1; }
          grep -q "$EXPECTED" configs/angela_config.json || { echo "❌ configs/angela_config.json: not $EXPECTED"; ERR=1; }
          grep -q "version = \"$EXPECTED\"" apps/backend/pyproject.toml || { echo "❌ apps/backend/pyproject.toml: not $EXPECTED"; ERR=1; }
          grep -q "version=\"$EXPECTED\"" apps/backend/setup.py || { echo "❌ apps/backend/setup.py: not $EXPECTED"; ERR=1; }
          grep -q "$EXPECTED" apps/backend/package.json || { echo "❌ apps/backend/package.json: not $EXPECTED"; ERR=1; }
          grep -q "major=7" apps/backend/src/core/version.py && grep -q "minor=5" apps/backend/src/core/version.py && grep -q "patch=0" apps/backend/src/core/version.py && grep -q "phase=ReleasePhase.DEV" apps/backend/src/core/version.py || { echo "❌ apps/backend/src/core/version.py: not major=7, minor=5, patch=0, phase=DEV"; ERR=1; }
          grep -q "$EXPECTED" apps/desktop-app/electron_app/package.json || { echo "❌ apps/desktop-app/electron_app/package.json: not $EXPECTED"; ERR=1; }
          grep -q "$EXPECTED" packages/cli/package.json || { echo "❌ packages/cli/package.json: not $EXPECTED"; ERR=1; }
          grep -q "VERSION: $EXPECTED" README.md || { echo "❌ README.md: expected $EXPECTED"; ERR=1; }
          grep -q "VERSION: $EXPECTED" AGENTS.md || { echo "❌ AGENTS.md: expected $EXPECTED"; ERR=1; }
          grep -q "version: \"$EXPECTED\"" configs/angela_config.yaml || { echo "❌ configs/angela_config.yaml: not $EXPECTED"; ERR=1; }
          grep -q "$EXPECTED" .github/workflows/ci.yml || { echo "❌ .github/workflows/ci.yml: self-check failed"; ERR=1; }
          if [ $ERR -eq 1 ]; then exit 1; else echo "✅ All version locations consistent ($EXPECTED)"; fi
      - name: Install backend (editable with extras)
        run: pip install -e "./apps/backend[dev]"
      - name: Lint/Type (Python)
        run: |
          black --check apps/backend/src tests/
          isort --check-only apps/backend/src tests/
          flake8 apps/backend/src tests/
          mypy apps/backend/src
      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r apps/backend/src -ll
      - name: Security scan (safety)
        run: |
          pip install safety
          safety check
      - name: Tests (Python)
        run: |
          pytest tests/unit/ tests/core/ tests/shared/ tests/services/ tests/ai/agents/ tests/api/ tests/ai/memory/test_type_fixes.py --cov=apps/backend/src --cov-report=term-missing -v

  secrets_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        with:
          args: --no-git
