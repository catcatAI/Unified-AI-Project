name: intent_registry
version: 1.0.0
kind: service
description: Unified intent detection with YAML-based keyword matching and learning feedback
depends_on:
  optional:
    - card_pipeline
provides:
  services:
    - name: intent_registry
      type: singleton
lifecycle:
  init: modules.intent_registry.init
  hooks:
    - event: card_pipeline.ready
      handler: modules.intent_registry.on_card_pipeline_ready
