name: resource_awareness_service
version: 1.0.0
kind: service
description: Real-time system resource monitor — CPU, memory, throttling, LLM budget
depends_on:
  required: []
  optional: []
provides:
  services:
    - name: resource_awareness_service
      type: singleton
lifecycle:
  init: modules.resource_awareness_service.init
  start: modules.resource_awareness_service.start
  stop: modules.resource_awareness_service.stop
  health:
    endpoint: /health/resource_awareness
