name: chat_service
version: 1.0.0
kind: service
description: Core chat service — intent routing, LLM response generation, plugin hooks
depends_on:
  required: []
  optional:
    - llm_service
provides:
  services:
    - name: chat_service
      type: singleton
lifecycle:
  init: modules.chat_service.init
  start: modules.chat_service.start
  stop: modules.chat_service.stop
  health:
    endpoint: /health/chat
