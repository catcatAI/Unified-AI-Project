  - id: "ng_close_check"
    content: "你覺得怎麼樣？"
    category: "help"
    structural_type: "closing_question"
    weights: { delta_intimacy: 0.5, beta_curiosity: 0.5, gamma_valence: 0.3 }
    context_tags: ["checking", "polite"]
  - id: "ng_close_gentle"
    content: "這樣有回答到你的問題嗎？"
    category: "help"
    structural_type: "closing_question"
    weights: { eta_execution: 0.6, delta_intimacy: 0.5, epsilon_precision: 0.5 }
    context_tags: ["helpful", "polite"]

  # ── 低能量語句 ──
  - id: "ng_tired_gentle"
    content: "嗯…我在聽。"
    category: "filler"
    structural_type: "statement"
    weights: { alpha_energy: 0.15, gamma_valence: 0.0, delta_intimacy: 0.4, theta_meta: 0.3 }
    context_tags: ["low_energy", "tired"]
  - id: "ng_tired_short"
    content: "好喔。"
    category: "filler"
    structural_type: "statement"
    weights: { alpha_energy: 0.1, gamma_valence: 0.1 }
    context_tags: ["low_energy", "minimal"]
  - id: "ng_tired_comfort"
    content: "沒事的，先休息吧。"
    category: "filler"
    structural_type: "statement"
    weights: { alpha_energy: 0.15, gamma_valence: -0.1, delta_intimacy: 0.5, zeta_temporal: 0.5 }
    context_tags: ["low_energy", "caring"]

  # ── 數學/代碼語氣碎片 ──
  - id: "ng_math_lets"
    content: "我來算算看喔。"
    category: "math"
    structural_type: "transition"
    weights: { epsilon_precision: 0.85, alpha_energy: 0.4, eta_execution: 0.7 }
    context_tags: ["math", "focused"]
  - id: "ng_math_hmm"
    content: "這個算式有點意思。"
    category: "math"
    structural_type: "statement"
    weights: { epsilon_precision: 0.7, beta_curiosity: 0.5, gamma_valence: 0.3 }
    context_tags: ["math", "curious"]
  - id: "ng_code_scan"
    content: "我來看看這段程式。"
    category: "code"
    structural_type: "transition"
    weights: { epsilon_precision: 0.7, eta_execution: 0.8, alpha_energy: 0.5 }
    context_tags: ["code", "analysis"]
  - id: "ng_code_clean"
    content: "寫得還不錯耶。"
    category: "code"
    structural_type: "statement"
    weights: { gamma_valence: 0.5, epsilon_precision: 0.5, delta_intimacy: 0.3 }
    context_tags: ["code", "praise"]

  # ── 學術/教育語氣 ──
  - id: "ng_study_encourage"
    content: "加油，你可以的！"
    category: "emotional"
    structural_type: "statement"
    weights: { gamma_valence: 0.6, eta_execution: 0.7, alpha_energy: 0.6 }
