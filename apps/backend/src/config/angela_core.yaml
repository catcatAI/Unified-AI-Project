# ── 用戶資訊提取 ──────────────────────────────────────────────────────────

user_profile:
  patterns:
    - name: "my_name_is"
      regex: '我(?:叫|的名字(?:是|叫)?)\s*(.+?)(?:[，。,\.]|$)'
      field: "name"
    - name: "i_am"
      regex: '我是\s*(.+?)(?:[，。,\.]|$)'
      field: "name"
      overwrite: false
    - name: "favorite"
      regex: '最喜歡\s*(.+?)(?:[，。,\.]|$)'
      field: "favorites"
      append: true
    - name: "my_attr_is"
      regex: '我的\s*(.+?)\s*(?:是|叫)\s*(.+?)(?:[，。,\.]|$)'
      field: "custom"

# ── 空間數學引擎 ──────────────────────────────────────────────────────────

spatial_math:
  operator_precedence:
    "+": 1
    "-": 1
    "*": 2
    "/": 2
    "**": 3
  spatial_ratio:
    - 1.0
    - 0.3
    - 0.15
  influence_factor_numerator: 25.0
  influence_factor_softening: 10.0
  complexity_divisor: 20.0
  certainty_base: 0.5
  certainty_per_char: 0.05
  fatigue_increment: 0.02
  intent_gravity_pull: 0.05
  intent_gravity_threshold: 0.001
  inter_dimensional_drag: 0.02

