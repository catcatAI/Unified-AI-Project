# ── 複雜度閾值 ─────────────────────────────────────────────────────────────

complexity:
  thresholds:
    high: 100    # 句子長度 > 100 → high complexity
    low: 20      # 句子長度 < 20 → low complexity
  high_complexity_keywords:
    - "為什麼"
    - "如何"
    - "解釋"
    - "分析"
    - "比較"
    - "複雜"
    - "詳細"
  low_complexity_keywords:
    - "是"
    - "不"
    - "好"
    - "謝謝"
    - "hi"
    - "嗨"

# ── Fallback 模式 ───────────────────────────────────────────────────────────

fallback_patterns:
  task_decompose:
    - "幫我"
    - "做一個"
    - "規劃"
    - "處理"
  character_card:
    - "角色卡"
    - "人物"
    - "建立角色"
    - "character"
  document:
    - "文章"
    - "報告"
    - "文件"
    - "寫一篇"
    - "document"
  research:
    - "研究"
    - "搜尋"
    - "調查"
    - "research"
  plan:
    - "計劃"
    - "安排"
    - "plan"

# ── 預定義模板（TemplateLibrary 初始內容）───────────────────────────────

predefined_templates:
  - id: "greeting_morning"
    content: "早安！今天也元氣滿滿的樣子呢～有什麼想聊的嗎？"
    category: "greeting"
    keywords: ["早安", "早上好", "早"]
  - id: "greeting_evening"
    content: "晚安～今天辛苦了，好好休息吧！"
    category: "greeting"
    keywords: ["晚安", "晚上好", "晚"]
  - id: "greeting_general"
    content: "你好呀！有什麼需要幫忙的嗎？"
    category: "greeting"
    keywords: ["你好", "嗨", "hi", "hey"]
  - id: "math_hint"
    content: "這個問題涉及數學計算，讓我來幫你分析。"
    category: "math"
    keywords: ["計算", "數學", "積分"]
  - id: "code_hint"
    content: "這段代碼我看過了，讓我幫你分析一下。"
    category: "code"
    keywords: ["代碼", "程式", "debug"]

# ── 段落下載 Timeout ──────────────────────────────────────────────────────

document_builder:
  segment_timeout_seconds: 15.0
  max_segments: 10
  learning_threshold:
    success_count: 3   # 成功 >= 3 次才學習格式
    keyword_match_count: 2  # keyword 匹配 >= 2 次才學習

# ── 情緒/Empathy 閾值 ─────────────────────────────────────────────────────

empathy:
  thresholds:
    high_arousal: 0.7
    high_valence: 0.6
    low_valence: 0.3
  emotion_keywords:
    happy: ["開心", "快樂", "高興", "happy", "joy"]
    sad: ["難過", "傷心", "悲傷", "sad", "upset"]
    angry: ["生氣", "憤怒", "氣", "angry", "mad"]
    scared: ["害怕", "恐懼", "擔心", "scared", "afraid"]

# ── 8D 座標追蹤 ──────────────────────────────────────────────────────────

state_tracking:
  coordinate_recalculation_on_update: true
  anchor_update_threshold: 0.1   # 變化 > 0.1 才更新 anchor
  history_window: 50

# ── θ 自檢 ────────────────────────────────────────────────────────────────

theta:
  novelty_estimation:
    min_threshold: 0.3
    high_novelty: 0.7
  self_correction:
    trigger_on_low_novelty: true
    correction_interval_turns: 5

# ── η 執行層 ─────────────────────────────────────────────────────────────

eta:
  module_trigger_curve:
    complexity_weight: 0.5
    novelty_weight: 0.3
    history_weight: 0.2
  execution_tracking:
    success_rate_window: 20
    auto_fallback_threshold: 0.6  # 成功率 < 60% 觸發降級