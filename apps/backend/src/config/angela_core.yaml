  abstraction_level_high: 0.4
  creation_urge_gain: 0.05
  correction_urge_gain: 0.03
  creation_urge_decay: 0.01
  alpha_min_energy: 0.3
  alpha_stress_drain: 0.05
  stress_to_rest_gain: 0.03
  comfort_formula_stress_weight: 0.5
  tension_formula_positive_weight: 0.8
  tension_formula_negative_weight: 0.2
  min_response_length_to_learn: 2
  max_drive_file_id_count: 5
  drive_api_base_url: "http://127.0.0.1:8000/api/v1"
  drive_page_size: 10
  drive_api_timeout: 30
  drive_download_timeout: 60
  drive_auth_timeout: 10
  drive_download_folder: "data/drive_downloads"
  web_search_num_results: 3
  web_search_timeout: 15
  drive_default_mime: "text/markdown"
  code_quality_threshold: 0.7
  memory_truncation_length: 200
  screen_content_truncation: 500
  file_content_truncation: 1500
  history_items_to_include: 2
  max_conversation_history: 50
  template_match_composed_threshold: 0.8
  template_match_hybrid_threshold: 0.5
  template_storage_confidence: 0.5
  max_keywords: 5
  emotion_confidence_base: 0.1
  emotion_confidence_max: 0.5
  emotion_intensity_normalizer: 3.0
  emotion_secondary_threshold: 0.5

# ── 數學驗證器 ─────────────────────────────────────────────────────────────

math_verifier:
  keywords:
    contains_math:
      - "多少"
      - "多少錢"
      - "價格"
      - "計算"
      - "等於"
      - "總共"
      - "剩下"
      - "剩餘"
      - "花了"
      - "買了"
      - "賣了"
      - "折扣"
      - "打折"
      - "稅"
      - "百分比"
      - "+"
      - "-"
      - "*"
      - "/"
      - "×"
      - "÷"
      - "加"
      - "減"
      - "乘"
      - "除"
      - "平方"
      - "開根號"
      - "次方"
      - "次幂"
  unit_pattern: '\d+\s*(元|塊|美元|人民幣|日圓)'
  operator_pattern: '\d+[\+\-\*\/\(\)]'
  word_problem_operators:
    pow:
      - "次方"
      - "次幂"
      - "幂"
    subtract:
      - "吃了"
      - "吃掉"
      - "減"
      - "-"
      - "剩"
      - "還有"
      - "拿走"
      - "用掉"
      - "花了"
      - "丟掉"
      - "消失"
      - "掉了"
      - "死"
      - "過世"
      - "離開"
      - "不見"
      - "去哪"
    add:
      - "加"
      - "+"
      - "又買"
      - "再拿"
      - "撿到"
      - "找到"
      - "獲得"
      - "生出"
    multiply:
      - "倍"
      - "乘"
      - "*"
      - "x"
  thresholds:
    extract_confidence_default: 0.5
    extract_fallback_confidence: 0.3
    extract_json_error_confidence: 0.2
    extract_failure_confidence: 0.1
    verification_match_diff: 0.01
    clarification_trigger_confidence: 0.7
    high_confidence_threshold: 0.8
  allowed_chars: "0123456789.+-*/()"

# ── 段落下載 Timeout ──────────────────────────────────────────────────────

document_builder:
  segment_timeout_seconds: 15.0
  max_segments: 10
  learning_threshold:
    success_count: 3   # 成功 >= 3 次才學習格式
    keyword_match_count: 2  # keyword 匹配 >= 2 次才學習

# ── 情緒/Empathy 閾值 ─────────────────────────────────────────────────────

empathy:
  thresholds:
    high_arousal: 0.7
    high_valence: 0.6
    low_valence: 0.3
  emotion_keywords:
    happy: ["開心", "快樂", "高興", "happy", "joy"]
    sad: ["難過", "傷心", "悲傷", "sad", "upset"]
    angry: ["生氣", "憤怒", "氣", "angry", "mad"]
    scared: ["害怕", "恐懼", "擔心", "scared", "afraid"]

# ── 8D 座標追蹤 ──────────────────────────────────────────────────────────

state_tracking:
  coordinate_recalculation_on_update: true
  anchor_update_threshold: 0.1   # 變化 > 0.1 才更新 anchor
  history_window: 50

# ── θ 自檢 ────────────────────────────────────────────────────────────────

theta:
  novelty_estimation:
    min_threshold: 0.3
    high_novelty: 0.7
  self_correction:
    trigger_on_low_novelty: true
    correction_interval_turns: 5

# ── η 執行層 ─────────────────────────────────────────────────────────────

eta:
  module_trigger_curve:
    complexity_weight: 0.5
    novelty_weight: 0.3
    history_weight: 0.2
  execution_tracking:
    success_rate_window: 20
    auto_fallback_threshold: 0.6  # 成功率 < 60% 觸發降級

# ── LLM 服務配置 ───────────────────────────────────────────────────────────

llm:
  defaults:
    temperature: 0.7
    max_tokens: 512
    timeout_default: 120.0
    health_check_timeout: 10
    max_conversation_history: 50
    default_response_max_tokens: 256
  backend_priority:
    - "ollama"
    - "google"
    - "openai"
    - "anthropic"
    - "llamacpp"
  biological_state:
    default_certainty: 0.5
    default_fatigue: 0.0
    default_mood: "calm"
    stress_high_threshold: 0.8
    stress_max: 100.0
    stress_default: 0.0
    energy_high: 30
    energy_moderate: 60
    energy_low: 70
    stress_high_desc: 0.8
    rest_need_high: 0.5
    fatigue_moderate: 0.2
    sleep_hours_threshold: 8.0
    caffeine_sensitivity: 0.7
  template_match:
    composed: 0.8
    hybrid: 0.5
    storage_confidence: 0.5
  memory:
    precompute_idle_threshold: 5.0
    precompute_cpu_threshold: 70.0
    precompute_max_queue: 50
    precompute_llm_timeout: 180.0
    task_generator_max_tasks: 10
  emotion:
    negation_words: ["不", "沒", "没", "别", "別", "非", "無", "无", "未"]
    intensifier_words: ["很", "非常", "太", "超", "極", "極其", "好", "真", "挺", "有點", "比較", "比較", "相當", "十分"]

# ── [auto] LLM Mode ──────────────────────────────────────────────────────
# 控制 NeuroAutoSelector 的行為
# 當 llm_mode = "auto" 時生效

auto_mode:
  enabled: true
  default_if_unknown: "ollama:phi:latest"
  min_time_budget_ms: 5000        # 低於此直接 NeuroBlender
  max_time_budget_ms: 60000       # 最高預算上限

  # 意圖對應的計算成本 (0.0-1.0)
  intent_cost:
    math: 0.9
    code: 0.8
    task: 0.7
    reasoning: 0.6
    general: 0.4
    smalltalk: 0.2
    emotion: 0.3

  # 硬體等級對應的時間預算 (ms)
  time_budget_table:
    extreme: 60000
    high: 30000
    medium: 20000
    low: 10000
    critical: 3000

  # 本地模型 RAM/VRAM 門檻
  local_model_ram_thresholds:
    - min_ram_gb: 16
      min_vram_gb: 8
      recommend: "deepseek-r1:latest"
    - min_ram_gb: 8
      min_vram_gb: 4
      recommend: "qwen2.5-coder:latest"
    - min_ram_gb: 4
      min_vram_gb: 0
      recommend: "phi:latest"

  # 雲端供應商優先順序
  cloud_providers_priority:
    - "openai"
    - "anthropic"
    - "google"