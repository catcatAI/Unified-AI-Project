  - id: "greeting_evening"
    content: "晚安～今天辛苦了，好好休息吧！"
    category: "greeting"
    keywords: ["晚安", "晚上好", "晚"]
  - id: "greeting_general"
    content: "你好呀！有什麼需要幫忙的嗎？"
