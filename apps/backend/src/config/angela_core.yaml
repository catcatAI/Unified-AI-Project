# ── 複雜度閾值 ─────────────────────────────────────────────────────────────

complexity:
  thresholds:
    high: 100
    low: 20
  neuro_blender:
    # NeuroBlender 直接輸出門檻：complexity 低於此值時跳過 LLM
    # LLM 可用時自動減半，讓更多對話走 LLM
    bypass_threshold: 0.4
    bypass_min_confidence: 0.3
  high_complexity_keywords:
    - "為什麼"
    - "如何"
    - "解釋"
    - "分析"
    - "比較"
    - "複雜"
    - "詳細"
  low_complexity_keywords:
    - "是"
    - "不"
    - "好"
    - "謝謝"
    - "hi"
    - "嗨"
  complexity_weights:
    high_kw_score: 0.12
    low_kw_score: 0.06
    length_high_max: 0.8
    length_high_extra: 0.2
    length_mid_range: 0.3
    length_mid_scale: 0.5
    length_low_max: 0.2
    length_low_scale: 0.1
  ambiguity_weights:
    question_mark: 0.15
    uncertainty_word: 0.08
    pronoun: 0.02
    length_factor: 0.05
    length_normalizer: 200.0
  uncertainty_keywords:
    - "也許"
    - "可能"
    - "不太確定"
    - "不确定"
    - "或許"
    - "好像"
    - "大概"
    - "应该"
    - "不知道"
    - "maybe"
    - "perhaps"
    - "probably"
    - "might"
    - "unsure"
  ambiguity_pronouns:
    - "你"
    - "他"
    - "她"
    - "它"
    - "某"
    - "某種"
    - "this"
    - "that"
    - "something"
    - "anything"
  file_op_sub_operations:
    organize:
      keywords:
        - "整理"
        - "organize"
        - "清理桌面"
        - "清理"
      aliases: ["organize", "org", "o"]
    search:
      keywords:
        - "找"
        - "搜尋"
        - "search"
        - "find"
      aliases: ["search", "find", "s", "f"]

