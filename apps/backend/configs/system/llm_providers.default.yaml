# ANGELA-MATRIX: [L2] [β] [C] [L1]
# LLM Providers Configuration — migrated from src/config/llm_providers.yaml (P3.3e)
# Provider definitions, routing policy, fallback chains, and performance tracking.
# Note: Provider endpoint configs (keys, URLs) live in llm.default.yaml and keys.*.yaml.

providers:
  ollama:
    endpoint: "http://localhost:11434"
    default_timeout_ms: 30000
    retry_attempts: 2
    models:
      - name: "phi:latest"
        capability: "general"
        latency_ms: 37000
        context_window: 2048
        description: "通用對話，輕量快速"
      - name: "qwen2.5-coder:latest"
        capability: "code"
        latency_ms: 15000
        context_window: 4096
        description: "代碼生成與分析"
      - name: "deepseek-r1:latest"
        capability: "reasoning"
        latency_ms: 40000
        context_window: 8192
        description: "複雜推理與數學"
      - name: "llama3.2:latest"
        capability: "general"
        latency_ms: 35000
        context_window: 8192
        description: "備用通用模型"

routing_policy:
  math: "deepseek-r1:latest"
  code: "qwen2.5-coder:latest"
  task: "deepseek-r1:latest"
  general: "phi:latest"
  complexity_high: "deepseek-r1:latest"
  complexity_medium: "phi:latest"
  complexity_low: "phi:latest"
  fallback: "llama3.2:latest"

fallback_chain:
  phi:latest:
    - "ollama:llama3.2:latest"
    - "openai:gpt-4o-mini"
  qwen2.5-coder:latest:
    - "ollama:codellama:latest"
  deepseek-r1:latest:
    - "ollama:deepseek-coder:latest"
    - "ollama:llama3.2:latest"

performance_tracking:
  success_rate_threshold: 0.70
  latency_threshold_ms: 30000
  tracking_window: 50

prompt_templates:
  general: |
    你是一個 AI 助手。請根據用戶輸入給出回應。
  math: |
    你是一個數學專家。請逐步解決以下問題，展現推理過程。
  code: |
    你是一個程式設計專家。請分析以下代碼並給出建議。
  system_context: |
    Angela 狀態: {state_context}
    8D 座標: {coordinates}
