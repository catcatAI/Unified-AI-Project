# ANGELA-MATRIX: [L2] [β] [C] [L1]
# Timing parameters — centralized durations for P6-3 magic number migration
# Maintained by COMPREHENSIVE_AUDIT_REPORT.md P3.x — all keys must match code usage

timing:
  loop:
    sleep_short: 0.1
    sleep_medium: 0.5
    sleep_long: 1.0
    sleep_very_long: 10.0
    sleep_extreme: 60.0
    sleep_fps: 0.033
    sleep_circuit_breaker: 300.0
    # P3.1: added 2026-05-31 — used by waiting_scheduler.py, event_loop_system.py, error_handler.py, lifespan.py, live2d_integration.py
    poll_interval: 0.5
    metrics_interval: 1.0
    demo_wait: 0.5
    live2d_update: 0.033
    security_audit: 3600
    plugin_tick: 30
    retry_operation: 0.1
    backup_operation: 0.1
    max_wait: 30.0

  timeout:
    short: 5.0
    medium: 10.0
    long: 30.0
    very_long: 60.0
    extreme: 120.0
    circuit_breaker_recovery: 300.0
    # P3.1: added 2026-05-31 — used by lifespan.py, waiting_scheduler.py, event_loop_system.py
    shutdown: 10.0
    queue_dequeue: 0.001
    llm: 60.0

  llm:
    default_temperature: 0.7
    default_max_tokens: 512
    math_temperature: 0.3
    math_max_tokens: 256
    project_temperature: 0.5
    project_max_tokens: 1024
    generate_timeout: 60.0

  heartbeat:
    max_interval: 60.0
    min_interval: 5.0
    base_rate: 30.0
    stress_divisor: 50.0
    stress_multiplier: 2
    low_battery_threshold: 20
    # P3.1: added 2026-05-31 — used by lifespan.py:get_metabolic_heartbeat()
    update_interval: 30.0

  vision:
    processing_fast: 0.02
    processing_medium: 0.05
    processing_slow: 0.1
    processing_ocr: 0.06
    processing_detect: 0.07
    processing_caption: 0.04
    processing_classify: 0.03
