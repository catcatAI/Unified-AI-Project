# Infrastructure & Bootstrap Configuration

hardware_tiers:
  Extreme:
    score_threshold: 80
    max_fps: 60
    llm_model: "gemini-1.5-pro-latest"
    precision: 1.0
  High:
    score_threshold: 60
    max_fps: 60
    llm_model: "gemini-pro"
    precision: 0.8
  Medium:
    score_threshold: 40
    max_fps: 30
    llm_model: "gemini-pro"
    precision: 0.5
  Low:
    score_threshold: 0
    max_fps: 24
    llm_model: "gemini-1.5-flash"
    precision: 0.3

scoring_weights:
  cpu_core_multiplier: 2
  memory_gb_multiplier: 1.25 # (score cores*2 + (mem//4)*5 formalized to mem*1.25)
  gpu_rtx_bonus: 40
  gpu_standard_bonus: 30

paths:
  venv: "venv"
  node_modules: "node_modules"
