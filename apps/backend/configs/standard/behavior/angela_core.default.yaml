# ANGELA-MATRIX: [L2] [β] [C] [L1]
# Angela Core Configuration — migrated from src/config/angela_core.yaml (P3.3e)
# Contains unique sections not present in other tiered configs.
# state_constants section is in behavior.default.yaml — do not duplicate here.

# ── Chat Flow ────────────────────────────────────────────────────────────────
chat_flow:
  default_flow: "angela_chat_service"
  http_timeout: 30.0
  max_message_length: 4000
  truncation_length: 1000
  truncation_message: "（訊息已截斷至 {max} 字元）"
  response_schema_version: "2.0"

# ── Middleware ───────────────────────────────────────────────────────────────
middleware:
  cors:
    enabled: true
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_headers: ["*"]
    allow_credentials: true

# ── Session Manager ──────────────────────────────────────────────────────────
session_manager:
  ttl_seconds: 3600
  max_sessions: 1000
  cleanup_interval: 300
  eviction_policy: "lru"

# ── Intent Keywords ──────────────────────────────────────────────────────────
intents:
