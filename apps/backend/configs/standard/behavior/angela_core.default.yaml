# ── User Profile Extraction ──────────────────────────────────────────────────
user_profile:
  patterns:
    - name: "my_name_is"
      regex: '我(?:叫|的名字(?:是|叫)?)\s*(.+?)(?:[，。,\.]|$)'
      field: "name"
    - name: "i_am"
      regex: '我是\s*(.+?)(?:[，。,\.]|$)'
      field: "name"
      overwrite: false
    - name: "favorite"
      regex: '最喜歡\s*(.+?)(?:[，。,\.]|$)'
      field: "favorites"
      append: true
    - name: "my_attr_is"
      regex: '我的\s*(.+?)\s*(?:是|叫)\s*(.+?)(?:[，。,\.]|$)'
      field: "custom"

# ── Spatial Math (unique keys not in spatial.default.yaml / influence.default.yaml) ──
spatial_math:
  operator_precedence:
    "+": 1
    "-": 1
    "*": 2
    "/": 2
    "**": 3
  spatial_ratio:
    - 1.0
    - 0.3
    - 0.15
  influence_factor_numerator: 25.0
  complexity_divisor: 20.0
  certainty_base: 0.5
  certainty_per_char: 0.05
  fatigue_increment: 0.02
  intent_gravity_threshold: 0.001

# ── Math Verifier ────────────────────────────────────────────────────────────
math_verifier:
  keywords:
    contains_math:
      - "多少"
      - "多少錢"
      - "價格"
      - "計算"
      - "等於"
      - "總共"
      - "剩下"
      - "剩餘"
      - "花了"
      - "買了"
      - "賣了"
      - "折扣"
      - "打折"
      - "稅"
      - "百分比"
      - "+"
      - "-"
      - "*"
      - "/"
      - "×"
      - "÷"
      - "加"
      - "減"
      - "乘"
      - "除"
      - "平方"
      - "開根號"
      - "次方"
      - "次幂"
  unit_pattern: '\d+\s*(元|塊|美元|人民幣|日圓)'
  operator_pattern: '\d+[\+\-\*\/\(\)]'
  word_problem_operators:
    pow:
      - "次方"
      - "次幂"
      - "幂"
    subtract:
      - "吃了"
      - "吃掉"
      - "減"
      - "-"
      - "剩"
      - "還有"
      - "拿走"
      - "用掉"
      - "花了"
      - "丟掉"
      - "消失"
      - "掉了"
      - "死"
      - "過世"
      - "離開"
      - "不見"
      - "去哪"
    add:
      - "加"
      - "+"
      - "又買"
      - "再拿"
      - "撿到"
      - "找到"
      - "獲得"
      - "生出"
    multiply:
      - "倍"
      - "乘"
      - "*"
      - "x"
  thresholds:
    extract_confidence_default: 0.5
    extract_fallback_confidence: 0.3
    extract_json_error_confidence: 0.2
    extract_failure_confidence: 0.1
    verification_match_diff: 0.01
    clarification_trigger_confidence: 0.7
    high_confidence_threshold: 0.8
  allowed_chars: "0123456789.+-*/()"

# ── Document Builder ─────────────────────────────────────────────────────────
document_builder:
  segment_timeout_seconds: 15.0
  max_segments: 10
  learning_threshold:
    success_count: 3
    keyword_match_count: 2

# ── LLM Service (unique keys not in llm.default.yaml / timing.default.yaml) ──
llm:
  defaults:
    temperature: 0.7
    max_tokens: 512
    timeout_default: 120.0
    health_check_timeout: 10
    max_conversation_history: 50
    default_response_max_tokens: 256
  backend_priority:
    - "ed3n"
    - "ollama"
    - "google"
    - "openai"
    - "anthropic"
    - "llamacpp"
  biological_state:
    default_certainty: 0.5
    default_fatigue: 0.0
    default_mood: "calm"
    stress_high_threshold: 0.8
    stress_max: 100.0
    stress_default: 0.0
    energy_high: 30
    energy_moderate: 60
    energy_low: 70
    stress_high_desc: 0.8
    rest_need_high: 0.5
    fatigue_moderate: 0.2
    sleep_hours_threshold: 8.0
    caffeine_sensitivity: 0.7
  template_match:
    composed: 0.8
    hybrid: 0.5
    storage_confidence: 0.5
  memory:
    precompute_idle_threshold: 5.0
    precompute_cpu_threshold: 70.0
    precompute_max_queue: 50
    precompute_llm_timeout: 180.0
    task_generator_max_tasks: 10
  emotion:
    negation_words: ["不", "沒", "没", "别", "別", "非", "無", "无", "未"]
    intensifier_words: ["很", "非常", "太", "超", "極", "極其", "好", "真", "挺", "有點", "比較", "比較", "相當", "十分"]

# ── [auto] LLM Mode ──────────────────────────────────────────────────────────
auto_mode:
  enabled: true
  default_if_unknown: "ollama:phi:latest"
  min_time_budget_ms: 5000
  max_time_budget_ms: 60000
  intent_cost:
    math: 0.9
    code: 0.8
    task: 0.7
    reasoning: 0.6
    general: 0.4
    smalltalk: 0.2
    emotion: 0.3
  time_budget_table:
    extreme: 60000
    high: 30000
    medium: 20000
    low: 10000
    critical: 3000
  local_model_ram_thresholds:
    - min_ram_gb: 16
      min_vram_gb: 8
      recommend: "deepseek-r1:latest"
    - min_ram_gb: 8
      min_vram_gb: 4
      recommend: "qwen2.5-coder:latest"
    - min_ram_gb: 4
      min_vram_gb: 0
      recommend: "phi:latest"
  cloud_providers_priority:
    - "openai"
    - "anthropic"
    - "google"
