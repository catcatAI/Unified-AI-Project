  epsilon:
    cn_name: "数理维度"
    initial_values: {logic: 0.5, precision: 0.5, abstraction: 0.5, certainty: 0.5, complexity: 0.0, fatigue: 0.0}
    weight: 0.3
    initial_coordinate: [0.0, 0.0, 0.0]
    anchor_keywords: ["計算", "邏輯", "數字", "精確", "calculate", "logic", "number", "math", "precise", "compute"]
    
  theta:
    cn_name: "元認知維度"
