# State Matrix Meta-Configuration
# Defines axes, initial values, and weights

dimensions:
  alpha:
    cn_name: "生理维度"
    initial_values: {energy: 0.5, comfort: 0.5, arousal: 0.5, rest_need: 0.5, vitality: 0.5, tension: 0.0}
    weight: 1.0
    initial_coordinate: [0.0, -5.0, 0.0]
    anchor_keywords: ["能量", "疲憊", "身體", "累", "餓", "渴", "健康", "energy", "tired", "body", "physical", "health"]
  
  beta:
    cn_name: "认知维度"
    initial_values: {curiosity: 0.5, focus: 0.5, confusion: 0.0, learning: 0.5, clarity: 0.5, creativity: 0.5}
    weight: 1.0
    initial_coordinate: [0.0, 10.0, 0.0]
