    anchor_keywords: ["複雜", "新穎", "創造", "策略", "分析", "元認知", "complex", "novel", "create", "strategy", "analyze"]
    
  zeta:
    cn_name: "意識流維度"
    initial_values: {temporal_coherence: 0.8, memory_depth: 0.6, narrative_flow: 0.7, identity_continuity: 0.75}
    weight: 0.2
    initial_coordinate: [0.0, 0.0, 0.0]
    anchor_keywords: ["記憶", "時間", "故事", "身份", "連續", "memory", "time", "story", "identity", "history", "narrative"]

system_limits:
  max_misallocation_log: 100
  max_audit_trail: 50
  max_history: 1000
  default_precision: 1.0
  history_interval: 1.0
